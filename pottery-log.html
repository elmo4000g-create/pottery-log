<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏺 陶芸記録</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F1EB;--surface:#FFFFFF;--border:#DDD8CE;
  --text:#2C2416;--sub:#7A6E60;--hint:#ADA098;
  --accent:#8B5E3C;--accent-l:#F0E8DF;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:1rem 1rem 5rem}

header{display:flex;align-items:center;justify-content:space-between;padding:1rem 0 1.25rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.logo{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}

nav{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:1.25rem}
.nb{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:var(--rs);font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--sub);cursor:pointer;font-weight:500;transition:.15s}
.nb:hover{background:var(--bg)}
.nb.active{background:var(--accent);color:#fff}
.sec{display:none}.sec.active{display:block}

/* Thumbnail grid */
.thumb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tg-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.tg-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.12)}
.tg-thumb{aspect-ratio:1;background:#EDE8E0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--hint)}
.tg-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.tg-info{padding:7px 8px 8px}
.tg-no{font-size:10px;color:var(--hint)}
.tg-title{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tg-date{font-size:11px;color:var(--sub);margin-top:2px}
.tg-actions{display:flex;gap:4px;padding:0 8px 8px}
.tg-btn{flex:1;padding:5px 0;font-size:12px;font-family:inherit;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer}
.tg-btn.edit{background:var(--accent);color:#fff;border-color:var(--accent)}
.tg-btn.del{color:#b83030;border-color:#f0cccc}

/* List (legacy, used in modal) */
.rc-photos{display:grid;gap:2px;background:var(--border)}
.rc-photos.p1{grid-template-columns:1fr}
.rc-photos.p2{grid-template-columns:1fr 1fr}
.rc-photos.p3{grid-template-columns:2fr 1fr;grid-template-rows:auto auto}
.rc-photos.p3 .ph:first-child{grid-row:1/3}
.ph{aspect-ratio:1;overflow:hidden;background:#EDE8E0}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.ph.empty-ph{display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--hint)}
.chip{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500}
.chip-date{background:var(--accent-l);color:var(--accent)}
.chip-tag{background:var(--bg);border:1px solid var(--border);color:var(--sub)}

/* Add / Edit */
.photo-section{margin-bottom:1.25rem}
.photo-section h3{font-size:13px;color:var(--sub);font-weight:500;margin-bottom:8px}
.photo-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photo-slot{aspect-ratio:1;border:2px dashed var(--border);border-radius:var(--rs);overflow:hidden;position:relative;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:.15s}
.photo-slot:hover{border-color:var(--accent);background:var(--accent-l)}
.photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.slot-inner{display:flex;flex-direction:column;align-items:center;gap:5px;z-index:0;cursor:pointer}
.slot-icon{font-size:28px}
.slot-label{font-size:11px;color:var(--hint);text-align:center}
.del-btn{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;z-index:3;display:none;align-items:center;justify-content:center;line-height:1}
.photo-slot:hover .del-btn.visible{display:flex}

.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.frow{margin-bottom:.9rem}
.frow:last-child{margin-bottom:0}
.frow label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:500}
.frow input,.frow select,.frow textarea{width:100%;padding:8px 11px;font-size:14px;font-family:inherit;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);outline:none;transition:.15s}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--accent)}
.frow textarea{height:80px;resize:vertical;line-height:1.6}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-save{width:100%;padding:12px;font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;letter-spacing:.05em;transition:.15s}
.btn-save:hover{background:#7A4F2E}
.btn-cancel{width:100%;padding:10px;font-family:inherit;font-size:13px;background:transparent;color:var(--sub);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;margin-top:8px}
.btn-cancel:hover{background:var(--bg)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;overflow-y:auto;padding:1rem}
.modal-bg.open{display:block}
.modal{background:var(--surface);border-radius:var(--r);width:100%;max-width:580px;margin:auto;overflow:hidden}
.modal-photos{display:grid;gap:2px;background:var(--border)}
.modal-photos.p1{grid-template-columns:1fr}
.modal-photos.p2{grid-template-columns:1fr 1fr}
.modal-photos.p3{grid-template-columns:1fr 1fr 1fr}
.modal-ph{aspect-ratio:1;overflow:hidden;background:#EDE8E0}
.modal-ph img{width:100%;height:100%;object-fit:cover;display:block}
.modal-body{padding:1.25rem}
.modal-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:600}
.modal-info{margin-top:.75rem;display:grid;grid-template-columns:1fr 1fr;gap:.4rem .75rem}
.info-row{font-size:13px;color:var(--sub)}
.info-row strong{color:var(--text);font-weight:500}
.modal-note{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:13px;color:var(--sub);line-height:1.7}
.modal-actions{display:flex;gap:8px;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.btn-edit{flex:1;padding:9px;font-family:inherit;font-size:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);cursor:pointer}
.btn-del{padding:9px 16px;font-family:inherit;font-size:13px;background:transparent;color:#b83030;border:1px solid #f0cccc;border-radius:var(--rs);cursor:pointer}
.btn-close-m{padding:9px 14px;font-family:inherit;font-size:13px;background:transparent;color:var(--sub);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#2C2416;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:.25s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.search-bar{margin-bottom:12px}
.search-bar input{width:100%;padding:10px 14px;font-size:14px;font-family:inherit;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);outline:none;}
.search-bar input:focus{border-color:var(--accent)}
.empty{text-align:center;padding:3rem 1rem;color:var(--hint);font-size:14px}
.empty-ico{font-size:48px;margin-bottom:12px;opacity:.5}
@media(max-width:480px){.fgrid{grid-template-columns:1fr}.thumb-grid{grid-template-columns:repeat(2,1fr)}}

/* Photo source chooser */
.photo-chooser-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:flex-end;justify-content:center}
.photo-chooser-bg.open{display:flex}
.photo-chooser{background:var(--surface);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;padding:1.25rem 1rem 2rem;display:flex;flex-direction:column;gap:10px}
.photo-chooser h4{font-size:13px;color:var(--sub);text-align:center;margin-bottom:2px}
.pc-btn{padding:14px;font-size:15px;font-family:'Noto Serif JP',serif;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);cursor:pointer;text-align:center}
.pc-btn:active{background:var(--accent-l)}
.pc-cancel{padding:12px;font-size:14px;font-family:inherit;border:none;border-radius:var(--rs);background:var(--bg);color:var(--sub);cursor:pointer}

/* Crop modal */
.crop-bg{display:none;position:fixed;inset:0;background:#000;z-index:400;flex-direction:column}
.crop-bg.open{display:flex}
.crop-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#111;color:#fff}
.crop-header span{font-size:15px;font-weight:600}
.crop-header button{padding:7px 16px;border:none;border-radius:20px;font-size:13px;cursor:pointer}
.crop-cancel-btn{background:rgba(255,255,255,.15);color:#fff}
.crop-ok-btn{background:var(--accent);color:#fff}
.crop-stage{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;touch-action:none}
.crop-stage canvas{display:block;max-width:100%;max-height:100%}
.crop-overlay{position:absolute;inset:0;pointer-events:none}
.crop-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:12px;white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">🏺 陶芸記録</div>
  </header>

  <nav>
    <button class="nb active" onclick="showTab('list')">📋 一覧</button>
    <button class="nb" onclick="showTab('add')">📷 新規記録</button>
  </nav>

  <!-- 一覧 -->
  <div class="sec active" id="tab-list">
    <div class="search-bar">
      <input type="search" id="search-input" placeholder="🔍 作品名・成形・粘土・釉薬・技法で検索…" oninput="renderList()">
    </div>
    <div id="records-list"></div>
  </div>

  <!-- 新規 / 編集 -->
  <div class="sec" id="tab-add">
    <div class="photo-section">
      <h3>📷 写真（途中①・途中②・完成）</h3>
      <div class="photo-slots" id="photo-slots"></div>
    </div>
    <div class="form-card">
      <div class="frow">
        <label>作品名 *</label>
        <input type="text" id="f-title" placeholder="例：湯呑み、花瓶、皿…">
      </div>
      <div class="frow">
        <label>日付</label>
        <input type="date" id="f-date">
      </div>
      <div class="fgrid">
        <div class="frow">
          <label>成形方法</label>
          <select id="f-method">
            <option>ろくろ</option><option>手びねり</option><option>たたら</option><option>型成形</option><option>その他</option>
          </select>
        </div>
        <div class="frow">
          <label>粘土の種類</label>
          <select id="f-clay">
            <option>信楽土</option><option>赤土</option><option>白土</option><option>磁器土</option><option>瀬戸土</option><option>その他</option>
          </select>
        </div>
      </div>
      <div class="fgrid">
        <div class="frow">
          <label>釉薬</label>
          <input type="text" id="f-glaze" placeholder="例：灰釉、青磁釉…">
        </div>
        <div class="frow">
          <label>技法・工程</label>
          <select id="f-technique">
            <option value="">—</option><option>しのぎ</option><option>象嵌</option><option>絵付け</option><option>その他</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <label>メモ</label>
        <textarea id="f-note" placeholder="気づいたこと、次回への改善点など…"></textarea>
      </div>
      <div class="frow">
        <label>タグ（カンマ区切り）</label>
        <input type="text" id="f-tags" placeholder="例：贈り物, 初挑戦">
      </div>
    </div>
    <button class="btn-save" onclick="saveRecord()">記録を保存する</button>
    <button class="btn-cancel" id="btn-cancel" style="display:none" onclick="cancelEdit()">キャンセル</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="modal" onclick="bgClick(event)">
  <div class="modal">
    <div id="modal-photos"></div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-info" id="modal-info"></div>
      <div class="modal-note" id="modal-note"></div>
      <div class="modal-actions">
        <button class="btn-edit" onclick="editRecord()">編集</button>
        <button class="btn-del" onclick="deleteRecord()">削除</button>
        <button class="btn-close-m" onclick="closeModal()">閉じる</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Photo source chooser -->
<div class="photo-chooser-bg" id="photo-chooser">
  <div class="photo-chooser">
    <h4>写真を選択</h4>
    <button class="pc-btn" id="pc-camera">📷 カメラで撮影</button>
    <button class="pc-btn" id="pc-album">🖼️ アルバムから選ぶ</button>
    <div id="pc-change-row" style="display:none">
      <button class="pc-btn" id="pc-delete-photo" style="color:#b83030;border-color:#f0cccc">🗑 この写真を削除</button>
    </div>
    <button class="pc-cancel" id="pc-cancel">キャンセル</button>
  </div>
</div>
<input type="file" id="inp-camera" accept="image/*" capture="environment" style="display:none">
<input type="file" id="inp-album" accept="image/*" style="display:none">

<!-- Crop modal -->
<div class="crop-bg" id="crop-modal">
  <div class="crop-header">
    <button class="crop-cancel-btn" id="crop-cancel">キャンセル</button>
    <span>切り取り</span>
    <button class="crop-ok-btn" id="crop-ok">使う</button>
  </div>
  <div class="crop-stage" id="crop-stage">
    <canvas id="crop-canvas"></canvas>
    <div class="crop-hint">ドラッグで位置調整・ピンチで拡大縮小</div>
  </div>
</div>

<script>
const KEY='pottery3';
let records=[],photos=['','',''],editId=null,viewId=null;
const LABELS=['途中①','途中②','完成'],ICONS=['📷','📷','🏺'];

function nextNo(){
  if(!records.length)return 1;
  return Math.max(...records.map(r=>r.no||0))+1;
}
function fmtNo(n){return '#'+String(n).padStart(3,'0');}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}

function load(){
  try{records=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){records=[];}
  setToday();buildSlots();renderList();
}

function setToday(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  document.getElementById('f-date').value=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

let activeSlot=null;

function buildSlots(){
  const wrap=document.getElementById('photo-slots');
  wrap.innerHTML='';
  [0,1,2].forEach(i=>{
    const div=document.createElement('div');
    div.className='photo-slot';div.id='slot'+i;
    div.innerHTML=`
      <div class="slot-inner" onclick="openChooser(${i})">
        <div class="slot-icon">${ICONS[i]}</div>
        <div class="slot-label">${LABELS[i]}</div>
      </div>
      <button class="del-btn" id="del${i}" onclick="delPhoto(event,${i})">✕</button>`;
    wrap.appendChild(div);
  });
  [0,1,2].forEach(i=>renderSlot(i));
}

// --- Photo chooser ---
function openChooser(i){
  activeSlot=i;
  // 写真があれば変更ボタンも表示
  const hasPhoto=!!photos[i];
  document.getElementById('pc-change-row').style.display=hasPhoto?'':'none';
  document.getElementById('photo-chooser').classList.add('open');
}
document.getElementById('pc-cancel').onclick=()=>document.getElementById('photo-chooser').classList.remove('open');
document.getElementById('pc-delete-photo').onclick=()=>{
  photos[activeSlot]='';renderSlot(activeSlot);
  document.getElementById('photo-chooser').classList.remove('open');
};
document.getElementById('pc-camera').onclick=()=>{
  document.getElementById('photo-chooser').classList.remove('open');
  document.getElementById('inp-camera').value='';
  document.getElementById('inp-camera').click();
};
document.getElementById('pc-album').onclick=()=>{
  document.getElementById('photo-chooser').classList.remove('open');
  document.getElementById('inp-album').value='';
  document.getElementById('inp-album').click();
};
document.getElementById('inp-camera').addEventListener('change',function(){if(this.files[0])startCrop(this.files[0]);});
document.getElementById('inp-album').addEventListener('change',function(){if(this.files[0])startCrop(this.files[0]);});

// --- Crop ---
let cropImg=null,cropX=0,cropY=0,cropScale=1,cropSize=0;
let drag=false,dragStartX=0,dragStartY=0,dragImgX=0,dragImgY=0;
let pinchDist=0,pinchScale=1;

function startCrop(file){
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{
    cropImg=img;
    URL.revokeObjectURL(url);
    // モーダルを先に開いてからサイズ取得
    document.getElementById('crop-modal').classList.add('open');
    requestAnimationFrame(()=>{
      const stage=document.getElementById('crop-stage');
      const sw=stage.clientWidth||window.innerWidth;
      const sh=stage.clientHeight||(window.innerHeight-56);
      cropSize=Math.min(sw,sh);
      const c=document.getElementById('crop-canvas');
      c.width=cropSize;c.height=cropSize;
      c.style.width=cropSize+'px';c.style.height=cropSize+'px';
      // 画像がcanvasを埋めるよう初期スケール設定
      cropScale=Math.max(cropSize/img.width,cropSize/img.height);
      cropX=(cropSize-img.width*cropScale)/2;
      cropY=(cropSize-img.height*cropScale)/2;
      drawCrop();
    });
  };
  img.src=url;
}

function drawCrop(){
  const c=document.getElementById('crop-canvas');
  if(!c||!cropImg||cropSize===0)return;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,cropSize,cropSize);
  ctx.drawImage(cropImg,cropX,cropY,cropImg.width*cropScale,cropImg.height*cropScale);
  // 枠線
  ctx.strokeStyle='rgba(255,255,255,0.7)';
  ctx.lineWidth=2;
  ctx.strokeRect(1,1,cropSize-2,cropSize-2);
}

function clampCrop(){
  const iw=cropImg.width*cropScale,ih=cropImg.height*cropScale;
  cropX=iw>=cropSize?Math.min(0,Math.max(cropSize-iw,cropX)):Math.max(0,Math.min(cropSize-iw,cropX));
  cropY=ih>=cropSize?Math.min(0,Math.max(cropSize-ih,cropY)):Math.max(0,Math.min(cropSize-ih,cropY));
}

// ドラッグ・ピンチ操作
const cs=document.getElementById('crop-stage');
cs.addEventListener('mousedown',e=>{drag=true;dragStartX=e.clientX;dragStartY=e.clientY;dragImgX=cropX;dragImgY=cropY;});
cs.addEventListener('mousemove',e=>{if(!drag)return;cropX=dragImgX+(e.clientX-dragStartX);cropY=dragImgY+(e.clientY-dragStartY);clampCrop();drawCrop();});
window.addEventListener('mouseup',()=>drag=false);
cs.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;dragImgX=cropX;dragImgY=cropY;}
  else if(e.touches.length===2){drag=false;pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinchScale=cropScale;}
},{passive:true});
cs.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){
    cropX=dragImgX+(e.touches[0].clientX-dragStartX);
    cropY=dragImgY+(e.touches[0].clientY-dragStartY);
    clampCrop();drawCrop();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const minScale=cropSize/Math.max(cropImg.width,cropImg.height)*0.5;
    cropScale=Math.max(minScale,Math.min(pinchScale*(d/pinchDist),6));
    clampCrop();drawCrop();
  }
},{passive:false});
cs.addEventListener('touchend',e=>{if(e.touches.length===0)drag=false;});

document.getElementById('crop-cancel').onclick=()=>{
  document.getElementById('crop-modal').classList.remove('open');
};
document.getElementById('crop-ok').onclick=()=>{
  // 元画像から正しくクロップして600x600で出力
  const out=document.createElement('canvas');
  out.width=600;out.height=600;
  const ctx=out.getContext('2d');
  const sx=-cropX/cropScale;
  const sy=-cropY/cropScale;
  const sw=cropSize/cropScale;
  const sh=cropSize/cropScale;
  ctx.drawImage(cropImg,sx,sy,sw,sh,0,0,600,600);
  photos[activeSlot]=out.toDataURL('image/jpeg',0.85);
  renderSlot(activeSlot);
  document.getElementById('crop-modal').classList.remove('open');
};

function renderSlot(i){
  const slot=document.getElementById('slot'+i),del=document.getElementById('del'+i);
  let img=slot.querySelector('img');
  const inner=slot.querySelector('.slot-inner');
  if(photos[i]){
    if(!img){img=document.createElement('img');slot.insertBefore(img,slot.firstChild);}
    img.src=photos[i];inner.style.visibility='hidden';del.classList.add('visible');
  }else{
    if(img)img.remove();inner.style.visibility='visible';del.classList.remove('visible');
  }
}

function delPhoto(e,i){
  e.stopPropagation();photos[i]='';renderSlot(i);
}

function showTab(t){
  ['list','add'].forEach((x,i)=>{
    document.querySelectorAll('.nb')[i].classList.toggle('active',x===t);
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  if(t==='list')renderList();
}

function saveRecord(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){toast('⚠️ 作品名を入力してください');return;}
  const dv=document.getElementById('f-date').value;
  const rec={
    id:editId||Date.now(),
    no:editId?(records.find(r=>r.id===editId)||{}).no||nextNo():nextNo(),
    title,
    date:dv?dv.replace(/-/g,'/'):new Date().toLocaleDateString('ja-JP'),
    method:document.getElementById('f-method').value,
    clay:document.getElementById('f-clay').value,
    glaze:document.getElementById('f-glaze').value.trim(),
    technique:document.getElementById('f-technique').value,
    note:document.getElementById('f-note').value.trim(),
    tags:document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    photos:[...photos]
  };
  if(editId){const idx=records.findIndex(r=>r.id===editId);if(idx>=0)records[idx]=rec;}
  else records.push(rec);
  localStorage.setItem(KEY,JSON.stringify(records));
  const isNew=!editId;
  const savedNo=fmtNo(rec.no);
  editId=null;
  const btn=document.querySelector('.btn-save');
  btn.disabled=true;
  btn.textContent=`${savedNo} 保存しました ✓`;
  toast(isNew?`${savedNo} 記録しました`:`${savedNo} 更新しました`);
  setTimeout(()=>{btn.disabled=false;btn.textContent='記録を保存する';resetForm();showTab('list');},1500);
}

function resetForm(){
  ['f-title','f-glaze','f-note','f-tags'].forEach(id=>document.getElementById(id).value='');
  setToday();photos=['','',''];buildSlots();
  document.getElementById('btn-cancel').style.display='none';
}

function cancelEdit(){editId=null;resetForm();showTab('list');}

function renderList(){
  const q=(document.getElementById('search-input')?.value||'').trim().toLowerCase();
  let list=[...records].reverse();
  if(q){list=list.filter(r=>[r.title,r.method,r.clay,r.glaze,r.technique,r.firing].join(' ').toLowerCase().includes(q));}
  const el=document.getElementById('records-list');
  if(!list.length){el.className='';el.innerHTML='<div class="empty"><div class="empty-ico">🔍</div>'+(q?'該当する作品がありません':'まだ記録がありません')+'</div>';return;}
  el.className='thumb-grid';
  el.innerHTML=list.map(r=>{
    const ps=(r.photos||[]).filter(p=>p);
    const thumb=ps.length?`<img src="${ps[ps.length-1]}" loading="lazy">`:'📷';
    return `<div class="tg-card">
      <div class="tg-thumb" onclick="openModal(${r.id})">${thumb}</div>
      <div class="tg-info" onclick="openModal(${r.id})">
        ${r.no?`<div class="tg-no">${fmtNo(r.no)}</div>`:''}
        <div class="tg-title">${esc(r.title)}</div>
        <div class="tg-date">${esc(r.date)}</div>
      </div>
      <div class="tg-actions">
        <button class="tg-btn edit" onclick="startEdit(${r.id})">編集</button>
        <button class="tg-btn del" onclick="confirmDelete(${r.id})">削除</button>
      </div>
    </div>`;
  }).join('');
}

function openModal(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  viewId=id;
  const ps=(r.photos||[]).filter(p=>p),pc=ps.length;
  document.getElementById('modal-photos').innerHTML=pc===0?''
    :`<div class="modal-photos ${pc===1?'p1':pc===2?'p2':'p3'}">${ps.map(p=>`<div class="modal-ph"><img src="${p}"></div>`).join('')}</div>`;
  document.getElementById('modal-title').textContent=(r.no?fmtNo(r.no)+' ':'')+r.title;
  document.getElementById('modal-info').innerHTML=[
    ['日付',r.date],['成形',r.method],['粘土',r.clay],['釉薬',r.glaze||'—'],['技法・工程',r.technique||r.firing||'—']
  ].map(([k,v])=>`<div class="info-row"><strong>${k}</strong>　${esc(v)}</div>`).join('');
  const ne=document.getElementById('modal-note');
  ne.textContent=r.note||'';ne.style.display=r.note?'':'none';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
function bgClick(e){if(e.target===document.getElementById('modal'))closeModal();}

function startEdit(id){viewId=id;editRecord();}

function confirmDelete(id){
  viewId=id;
  if(!confirm('この記録を削除しますか？'))return;
  records=records.filter(r=>r.id!==viewId);
  localStorage.setItem(KEY,JSON.stringify(records));
  renderList();toast('🗑 削除しました');
}

function editRecord(){
  const r=records.find(x=>x.id===viewId);if(!r)return;
  editId=r.id;closeModal();
  document.getElementById('f-title').value=r.title||'';
  document.getElementById('f-date').value=(r.date||'').replace(/\//g,'-');
  document.getElementById('f-method').value=r.method||'ろくろ';
  document.getElementById('f-clay').value=r.clay||'信楽土';
  document.getElementById('f-glaze').value=r.glaze||'';
  document.getElementById('f-technique').value=r.technique||r.firing||'';
  document.getElementById('f-note').value=r.note||'';
  document.getElementById('f-tags').value=(r.tags||[]).join(', ');
  photos=[...(r.photos||['','',''])];buildSlots();
  document.getElementById('btn-cancel').style.display='';
  showTab('add');
}

function deleteRecord(){
  if(!confirm('この記録を削除しますか？'))return;
  records=records.filter(r=>r.id!==viewId);
  localStorage.setItem(KEY,JSON.stringify(records));
  closeModal();renderList();toast('🗑 削除しました');
}

load();
</script>
</body>
