<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏺 陶芸記録</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F1EB;--surface:#FFFFFF;--border:#DDD8CE;
  --text:#2C2416;--sub:#7A6E60;--hint:#ADA098;
  --accent:#8B5E3C;--accent-l:#F0E8DF;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:1rem 1rem 5rem}
header{display:flex;align-items:center;padding:1rem 0 1.25rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.logo{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
nav{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:1.25rem}
.nb{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:var(--rs);font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--sub);cursor:pointer;font-weight:500;transition:.15s}
.nb:hover{background:var(--bg)}.nb.active{background:var(--accent);color:#fff}
.sec{display:none}.sec.active{display:block}

.rc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;cursor:pointer;transition:box-shadow .2s}
.rc:hover{box-shadow:0 3px 14px rgba(0,0,0,.09)}
.rc-photos{display:grid;gap:2px;background:var(--border)}
.rc-photos.p1{grid-template-columns:1fr}
.rc-photos.p2{grid-template-columns:1fr 1fr}
.rc-photos.p3{grid-template-columns:2fr 1fr;grid-template-rows:auto auto}
.rc-photos.p3 .ph:first-child{grid-row:1/3}
.ph{aspect-ratio:1;overflow:hidden;background:#EDE8E0}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.ph.empty-ph{display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--hint)}
.rc-body{padding:1rem 1.1rem}
.rc-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600}
.rc-meta{font-size:12px;color:var(--sub);margin-top:4px;line-height:1.6}
.rc-footer{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.chip{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500}
.chip-date{background:var(--accent-l);color:var(--accent)}
.chip-tag{background:var(--bg);border:1px solid var(--border);color:var(--sub)}
.rc-note{font-size:13px;color:var(--sub);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.65}

.photo-section{margin-bottom:1.25rem}
.photo-section h3{font-size:13px;color:var(--sub);font-weight:500;margin-bottom:8px}
.photo-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photo-slot{aspect-ratio:1;border:2px dashed var(--border);border-radius:var(--rs);overflow:hidden;position:relative;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:.15s;cursor:pointer}
.photo-slot:hover{border-color:var(--accent);background:var(--accent-l)}
.photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.slot-inner{display:flex;flex-direction:column;align-items:center;gap:5px;z-index:0}
.slot-icon{font-size:28px}.slot-label{font-size:11px;color:var(--hint);text-align:center}
.del-btn{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;z-index:3;display:none;align-items:center;justify-content:center;line-height:1}
.photo-slot:hover .del-btn.visible{display:flex}

.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.frow{margin-bottom:.9rem}.frow:last-child{margin-bottom:0}
.frow label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:500}
.frow input,.frow select,.frow textarea{width:100%;padding:8px 11px;font-size:14px;font-family:inherit;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);outline:none;transition:.15s}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--accent)}
.frow textarea{height:80px;resize:vertical;line-height:1.6}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-save{width:100%;padding:12px;font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;letter-spacing:.05em;transition:.15s}
.btn-save:hover{background:#7A4F2E}
.btn-cancel{width:100%;padding:10px;font-family:inherit;font-size:13px;background:transparent;color:var(--sub);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;margin-top:8px}

/* Photo source picker */
.picker-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.picker-bg.open{display:flex}
.picker{background:var(--surface);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;padding:1.25rem;padding-bottom:calc(1.25rem + env(safe-area-inset-bottom))}
.picker h4{font-size:13px;color:var(--hint);text-align:center;margin-bottom:1rem}
.picker-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;background:var(--bg);border:none;border-radius:var(--rs);font-family:inherit;font-size:15px;color:var(--text);cursor:pointer;margin-bottom:8px;text-align:left}
.picker-btn:hover{background:var(--accent-l)}
.picker-btn .pico{font-size:22px;width:32px;text-align:center}
.picker-cancel{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:14px;color:var(--sub);cursor:pointer;margin-top:4px}

/* Crop modal */
.crop-bg{display:none;position:fixed;inset:0;background:#000;z-index:300;flex-direction:column}
.crop-bg.open{display:flex}
.crop-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#111}
.crop-header span{color:#fff;font-size:15px;font-weight:500}
.crop-header button{padding:7px 16px;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;cursor:pointer}
.crop-ok{background:var(--accent);color:#fff}
.crop-cancel-btn{background:#333;color:#ccc}
.crop-wrap{flex:1;position:relative;overflow:hidden;touch-action:none}
#crop-canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.crop-overlay{position:absolute;inset:0;pointer-events:none}
.crop-box{position:absolute;border:2px solid #fff;box-shadow:0 0 0 9999px rgba(0,0,0,.5);cursor:move}
.crop-handle{position:absolute;width:18px;height:18px;background:#fff;border-radius:2px}
.crop-handle.tl{top:-9px;left:-9px;cursor:nwse-resize}
.crop-handle.tr{top:-9px;right:-9px;cursor:nesw-resize}
.crop-handle.bl{bottom:-9px;left:-9px;cursor:nesw-resize}
.crop-handle.br{bottom:-9px;right:-9px;cursor:nwse-resize}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;overflow-y:auto;padding:1rem}
.modal-bg.open{display:block}
.modal{background:var(--surface);border-radius:var(--r);width:100%;max-width:580px;margin:auto;overflow:hidden}
.modal-photos{display:grid;gap:2px;background:var(--border)}
.modal-photos.p1{grid-template-columns:1fr}
.modal-photos.p2{grid-template-columns:1fr 1fr}
.modal-photos.p3{grid-template-columns:1fr 1fr 1fr}
.modal-ph{aspect-ratio:1;overflow:hidden;background:#EDE8E0}
.modal-ph img{width:100%;height:100%;object-fit:cover;display:block}
.modal-body{padding:1.25rem}
.modal-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:600}
.modal-info{margin-top:.75rem;display:grid;grid-template-columns:1fr 1fr;gap:.4rem .75rem}
.info-row{font-size:13px;color:var(--sub)}
.info-row strong{color:var(--text);font-weight:500}
.modal-note{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:13px;color:var(--sub);line-height:1.7}
.modal-actions{display:flex;gap:8px;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.btn-edit{flex:1;padding:9px;font-family:inherit;font-size:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);cursor:pointer}
.btn-del{padding:9px 16px;font-family:inherit;font-size:13px;background:transparent;color:#b83030;border:1px solid #f0cccc;border-radius:var(--rs);cursor:pointer}
.btn-close-m{padding:9px 14px;font-family:inherit;font-size:13px;background:transparent;color:var(--sub);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#2C2416;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:.25s;z-index:400;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:3rem 1rem;color:var(--hint);font-size:14px}
.empty-ico{font-size:48px;margin-bottom:12px;opacity:.5}
@media(max-width:480px){.fgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">🏺 陶芸記録</div>
  </header>
  <nav>
    <button class="nb active" onclick="showTab('list')">📋 一覧</button>
    <button class="nb" onclick="showTab('add')">📷 新規記録</button>
  </nav>

  <div class="sec active" id="tab-list">
    <div id="records-list"></div>
  </div>

  <div class="sec" id="tab-add">
    <div class="photo-section">
      <h3>📷 写真（途中①・途中②・完成）</h3>
      <div class="photo-slots" id="photo-slots"></div>
    </div>
    <div class="form-card">
      <div class="frow">
        <label>作品名 *</label>
        <input type="text" id="f-title" placeholder="例：湯呑み、花瓶、皿…">
      </div>
      <div class="frow">
        <label>日付</label>
        <input type="date" id="f-date">
      </div>
      <div class="fgrid">
        <div class="frow">
          <label>成形方法</label>
          <select id="f-method">
            <option>ろくろ</option><option>手びねり</option><option>たたら</option><option>型成形</option><option>その他</option>
          </select>
        </div>
        <div class="frow">
          <label>粘土の種類</label>
          <select id="f-clay">
            <option>信楽土</option><option>赤土</option><option>白土</option><option>磁器土</option><option>瀬戸土</option><option>その他</option>
          </select>
        </div>
      </div>
      <div class="fgrid">
        <div class="frow">
          <label>釉薬</label>
          <input type="text" id="f-glaze" placeholder="例：灰釉、青磁釉…">
        </div>
        <div class="frow">
          <label>焼き方</label>
          <select id="f-firing">
            <option>電気窯</option><option>ガス窯</option><option>薪窯</option><option>楽焼き</option><option>野焼き</option><option>その他</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <label>メモ</label>
        <textarea id="f-note" placeholder="気づいたこと、次回への改善点など…"></textarea>
      </div>
      <div class="frow">
        <label>タグ（カンマ区切り）</label>
        <input type="text" id="f-tags" placeholder="例：贈り物, 初挑戦">
      </div>
    </div>
    <button class="btn-save" onclick="saveRecord()">記録を保存する</button>
    <button class="btn-cancel" id="btn-cancel" style="display:none" onclick="cancelEdit()">キャンセル</button>
  </div>
</div>

<!-- Photo source picker -->
<div class="picker-bg" id="picker-bg" onclick="closePicker(event)">
  <div class="picker">
    <h4>写真を選ぶ</h4>
    <button class="picker-btn" onclick="triggerCamera()">
      <span class="pico">📷</span>カメラで撮影
    </button>
    <button class="picker-btn" onclick="triggerAlbum()">
      <span class="pico">🖼️</span>アルバムから選ぶ
    </button>
    <button class="picker-cancel" onclick="closePicker()">キャンセル</button>
  </div>
</div>
<input type="file" id="inp-camera" accept="image/*" capture="camera" style="display:none">
<input type="file" id="inp-album" accept="image/*" style="display:none">

<!-- Crop UI -->
<div class="crop-bg" id="crop-bg">
  <div class="crop-header">
    <button class="crop-cancel-btn" onclick="cancelCrop()">キャンセル</button>
    <span>切り取り</span>
    <button class="crop-ok" onclick="applyCrop()">完了</button>
  </div>
  <div class="crop-wrap" id="crop-wrap">
    <canvas id="crop-canvas"></canvas>
    <div class="crop-box" id="crop-box">
      <div class="crop-handle tl" data-h="tl"></div>
      <div class="crop-handle tr" data-h="tr"></div>
      <div class="crop-handle bl" data-h="bl"></div>
      <div class="crop-handle br" data-h="br"></div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="modal" onclick="bgClick(event)">
  <div class="modal">
    <div id="modal-photos"></div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-info" id="modal-info"></div>
      <div class="modal-note" id="modal-note"></div>
      <div class="modal-actions">
        <button class="btn-edit" onclick="editRecord()">編集</button>
        <button class="btn-del" onclick="deleteRecord()">削除</button>
        <button class="btn-close-m" onclick="closeModal()">閉じる</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const KEY='pottery4';
let records=[],photos=['','',''],editId=null,viewId=null,currentSlot=null;
const LABELS=['途中①','途中②','完成'],ICONS=['📷','📷','🏺'];

/* Crop state */
let cropImg=null, cropScale=1, cropOffX=0, cropOffY=0;
let box={x:40,y:40,w:200,h:200};
let drag=null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}

function load(){
  try{records=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){records=[];}
  setToday();buildSlots();renderList();
}

function setToday(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  document.getElementById('f-date').value=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

/* Slots */
function buildSlots(){
  const wrap=document.getElementById('photo-slots');wrap.innerHTML='';
  [0,1,2].forEach(i=>{
    const div=document.createElement('div');
    div.className='photo-slot';div.id='slot'+i;
    div.innerHTML=`
      <div class="slot-inner"><div class="slot-icon">${ICONS[i]}</div><div class="slot-label">${LABELS[i]}</div></div>
      <button class="del-btn" id="del${i}">✕</button>`;
    div.addEventListener('click',()=>openPicker(i));
    div.querySelector('.del-btn').addEventListener('click',e=>{e.stopPropagation();delPhoto(i);});
    wrap.appendChild(div);
    renderSlot(i);
  });
}

function renderSlot(i){
  const slot=document.getElementById('slot'+i),del=document.getElementById('del'+i);
  let img=slot.querySelector('img');
  if(photos[i]){
    if(!img){img=document.createElement('img');slot.insertBefore(img,slot.firstChild);}
    img.src=photos[i];
    slot.querySelector('.slot-inner').style.visibility='hidden';
    del.classList.add('visible');
  }else{
    if(img)img.remove();
    slot.querySelector('.slot-inner').style.visibility='visible';
    del.classList.remove('visible');
  }
}

function delPhoto(i){photos[i]='';renderSlot(i);}

/* Picker */
function openPicker(i){currentSlot=i;document.getElementById('picker-bg').classList.add('open');}
function closePicker(e){if(!e||e.target===document.getElementById('picker-bg'))document.getElementById('picker-bg').classList.remove('open');}
function triggerCamera(){closePicker();document.getElementById('inp-camera').click();}
function triggerAlbum(){closePicker();document.getElementById('inp-album').click();}

document.getElementById('inp-camera').addEventListener('change',function(){if(this.files[0])loadForCrop(this.files[0]);this.value='';});
document.getElementById('inp-album').addEventListener('change',function(){if(this.files[0])loadForCrop(this.files[0]);this.value='';});

/* Crop */
function loadForCrop(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{cropImg=img;openCrop();};
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function openCrop(){
  const bg=document.getElementById('crop-bg');
  bg.classList.add('open');
  setTimeout(()=>{
    const wrap=document.getElementById('crop-wrap');
    const ww=wrap.clientWidth,wh=wrap.clientHeight;
    const iw=cropImg.naturalWidth,ih=cropImg.naturalHeight;
    cropScale=Math.min(ww/iw,wh/ih);
    const cw=Math.round(iw*cropScale),ch=Math.round(ih*cropScale);
    cropOffX=(ww-cw)/2;cropOffY=(wh-ch)/2;
    const canvas=document.getElementById('crop-canvas');
    canvas.width=cw;canvas.height=ch;
    canvas.style.left=cropOffX+'px';canvas.style.top=cropOffY+'px';
    canvas.style.transform='none';
    const ctx=canvas.getContext('2d');
    ctx.drawImage(cropImg,0,0,cw,ch);
    const size=Math.min(cw,ch)*0.8;
    box={x:cropOffX+(cw-size)/2,y:cropOffY+(ch-size)/2,w:size,h:size};
    drawBox();
    setupCropDrag();
  },50);
}

function drawBox(){
  const b=document.getElementById('crop-box');
  b.style.left=box.x+'px';b.style.top=box.y+'px';
  b.style.width=box.w+'px';b.style.height=box.h+'px';
}

function setupCropDrag(){
  const wrap=document.getElementById('crop-wrap');
  const cropBox=document.getElementById('crop-box');
  const MIN=40;

  function getXY(e){
    const t=e.touches?e.touches[0]:e;
    const r=wrap.getBoundingClientRect();
    return{x:t.clientX-r.left,y:t.clientY-r.top};
  }

  function onDown(e){
    e.preventDefault();
    const p=getXY(e);
    const h=e.target.dataset.h;
    if(h){drag={type:'resize',h,sx:p.x,sy:p.y,bx:box.x,by:box.y,bw:box.w,bh:box.h};}
    else if(e.target===cropBox||cropBox.contains(e.target)){drag={type:'move',sx:p.x,sy:p.y,bx:box.x,by:box.y};}
  }

  function onMove(e){
    if(!drag)return;e.preventDefault();
    const p=getXY(e);
    const dx=p.x-drag.sx,dy=p.y-drag.sy;
    const canvas=document.getElementById('crop-canvas');
    const cleft=cropOffX,ctop=cropOffY,cright=cropOffX+canvas.width,cbottom=cropOffY+canvas.height;
    if(drag.type==='move'){
      box.x=Math.max(cleft,Math.min(cright-box.w,drag.bx+dx));
      box.y=Math.max(ctop,Math.min(cbottom-box.h,drag.by+dy));
    }else{
      let nx=drag.bx,ny=drag.by,nw=drag.bw,nh=drag.bh;
      const h=drag.h;
      if(h==='tl'){nx=Math.min(drag.bx+drag.bw-MIN,drag.bx+dx);ny=Math.min(drag.by+drag.bh-MIN,drag.by+dy);nw=drag.bx+drag.bw-nx;nh=drag.by+drag.bh-ny;}
      if(h==='tr'){nw=Math.max(MIN,drag.bw+dx);ny=Math.min(drag.by+drag.bh-MIN,drag.by+dy);nh=drag.by+drag.bh-ny;}
      if(h==='bl'){nx=Math.min(drag.bx+drag.bw-MIN,drag.bx+dx);nw=drag.bx+drag.bw-nx;nh=Math.max(MIN,drag.bh+dy);}
      if(h==='br'){nw=Math.max(MIN,drag.bw+dx);nh=Math.max(MIN,drag.bh+dy);}
      nx=Math.max(cleft,nx);ny=Math.max(ctop,ny);
      nw=Math.min(nw,cright-nx);nh=Math.min(nh,cbottom-ny);
      box={x:nx,y:ny,w:nw,h:nh};
    }
    drawBox();
  }

  function onUp(){drag=null;}
  wrap.addEventListener('mousedown',onDown);wrap.addEventListener('mousemove',onMove);wrap.addEventListener('mouseup',onUp);
  wrap.addEventListener('touchstart',onDown,{passive:false});wrap.addEventListener('touchmove',onMove,{passive:false});wrap.addEventListener('touchend',onUp);
}

function applyCrop(){
  const canvas=document.getElementById('crop-canvas');
  const sx=(box.x-cropOffX)/cropScale,sy=(box.y-cropOffY)/cropScale;
  const sw=box.w/cropScale,sh=box.h/cropScale;
  const out=document.createElement('canvas');
  const size=Math.max(sw,sh);
  out.width=size;out.height=size;
  const ctx=out.getContext('2d');
  ctx.drawImage(cropImg,sx,sy,sw,sh,0,0,size,size);
  photos[currentSlot]=out.toDataURL('image/jpeg',0.85);
  renderSlot(currentSlot);
  document.getElementById('crop-bg').classList.remove('open');
}

function cancelCrop(){document.getElementById('crop-bg').classList.remove('open');}

/* Tab */
function showTab(t){
  ['list','add'].forEach((x,i)=>{
    document.querySelectorAll('.nb')[i].classList.toggle('active',x===t);
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  if(t==='list')renderList();
}

/* Save */
function saveRecord(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){toast('⚠️ 作品名を入力してください');return;}
  const dv=document.getElementById('f-date').value;
  const rec={
    id:editId||Date.now(),title,
    date:dv?dv.replace(/-/g,'/'):new Date().toLocaleDateString('ja-JP'),
    method:document.getElementById('f-method').value,
    clay:document.getElementById('f-clay').value,
    glaze:document.getElementById('f-glaze').value.trim(),
    firing:document.getElementById('f-firing').value,
    note:document.getElementById('f-note').value.trim(),
    tags:document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    photos:[...photos]
  };
  if(editId){const idx=records.findIndex(r=>r.id===editId);if(idx>=0)records[idx]=rec;}
  else records.push(rec);
  localStorage.setItem(KEY,JSON.stringify(records));
  resetForm();toast(editId?'✅ 更新しました':'✅ 記録しました');
  editId=null;showTab('list');
}

function resetForm(){
  ['f-title','f-glaze','f-note','f-tags'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-method').value='ろくろ';
  document.getElementById('f-firing').value='電気窯';
  setToday();photos=['','',''];buildSlots();
  document.getElementById('btn-cancel').style.display='none';
}

function cancelEdit(){editId=null;resetForm();showTab('list');}

/* List */
function renderList(){
  const list=[...records].reverse();
  const el=document.getElementById('records-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-ico">🪴</div>まだ記録がありません</div>';return;}
  el.innerHTML=list.map(r=>{
    const ps=(r.photos||[]).filter(p=>p),pc=ps.length;
    const phHtml=pc===0
      ?`<div class="rc-photos p1"><div class="ph empty-ph">📷</div></div>`
      :`<div class="rc-photos ${pc===1?'p1':pc===2?'p2':'p3'}">${ps.map(p=>`<div class="ph"><img src="${p}" loading="lazy"></div>`).join('')}</div>`;
    return `<div class="rc" onclick="openModal(${r.id})">
      ${phHtml}
      <div class="rc-body">
        <div class="rc-title">${esc(r.title)}</div>
        <div class="rc-meta">${esc(r.method)} · ${esc(r.clay)} · ${esc(r.firing)}${r.glaze?' · '+esc(r.glaze):''}</div>
        <div class="rc-footer">
          <span class="chip chip-date">${esc(r.date)}</span>
          ${(r.tags||[]).map(t=>`<span class="chip chip-tag">${esc(t)}</span>`).join('')}
        </div>
        ${r.note?`<div class="rc-note">${esc(r.note)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

/* Modal */
function openModal(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  viewId=id;
  const ps=(r.photos||[]).filter(p=>p),pc=ps.length;
  document.getElementById('modal-photos').innerHTML=pc===0?''
    :`<div class="modal-photos ${pc===1?'p1':pc===2?'p2':'p3'}">${ps.map(p=>`<div class="modal-ph"><img src="${p}"></div>`).join('')}</div>`;
  document.getElementById('modal-title').textContent=r.title;
  document.getElementById('modal-info').innerHTML=[
    ['日付',r.date],['成形',r.method],['粘土',r.clay],['釉薬',r.glaze||'—'],['焼き方',r.firing]
  ].map(([k,v])=>`<div class="info-row"><strong>${k}</strong>　${esc(v)}</div>`).join('');
  const ne=document.getElementById('modal-note');
  ne.textContent=r.note||'';ne.style.display=r.note?'':'none';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
function bgClick(e){if(e.target===document.getElementById('modal'))closeModal();}

function editRecord(){
  const r=records.find(x=>x.id===viewId);if(!r)return;
  editId=r.id;closeModal();
  document.getElementById('f-title').value=r.title||'';
  document.getElementById('f-date').value=(r.date||'').replace(/\//g,'-');
  document.getElementById('f-method').value=r.method||'ろくろ';
  document.getElementById('f-clay').value=r.clay||'信楽土';
  document.getElementById('f-glaze').value=r.glaze||'';
  document.getElementById('f-firing').value=r.firing||'電気窯';
  document.getElementById('f-note').value=r.note||'';
  document.getElementById('f-tags').value=(r.tags||[]).join(', ');
  photos=[...(r.photos||['','',''])];buildSlots();
  document.getElementById('btn-cancel').style.display='';
  showTab('add');
}

function deleteRecord(){
  if(!confirm('この記録を削除しますか？'))return;
  records=records.filter(r=>r.id!==viewId);
  localStorage.setItem(KEY,JSON.stringify(records));
  closeModal();renderList();toast('🗑 削除しました');
}

load();
</script>
</body>
</html>
